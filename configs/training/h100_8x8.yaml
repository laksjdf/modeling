# H100 cluster system specification
# 8 nodes, 8 GPUs per node (64 total)

system:
  gpu:
    name: h100
    flops_bf16: 989      # TFLOP/s (dense)
    flops_fp8: 1979      # TFLOP/s
    hbm_gb: 80
    hbm_bw_gbps: 3350    # aggregate HBM bandwidth (GB/s)
  host_mem_gb: 2048
  nodes: 8
  gpus_per_node: 8
  nets:
    - scope: intra_node
      bw_gbps: 900       # NVLink bidirectional per link
      latency_us: 1.0
      topology: nvswitch
    - scope: inter_node
      bw_gbps: 400       # InfiniBand
      latency_us: 5.0
      topology: fattree
