# Llama-3 70B training estimate — combined config
# 80 dense layers, 64 H100s, TP=8/PP=2/DP=4

model:
  hidden: 8192
  ffn: 28672
  num_heads: 64
  num_kv_heads: 8
  head_dim: 128
  vocab: 128256
  seq_len: 4096
  layers: "[dense]*80"
  param_dtype: bf16
  grad_dtype: fp32
  master_dtype: fp32
  act_dtype: bf16

system:
  gpu:
    name: h100
    flops_bf16: 989
    flops_fp8: 1979
    hbm_gb: 80
    hbm_bw_gbps: 3350
  host_mem_gb: 2048
  nodes: 8
  gpus_per_node: 8
  nets:
    - scope: intra_node
      bw_gbps: 900
      latency_us: 1.0
      topology: nvswitch
    - scope: inter_node
      bw_gbps: 400
      latency_us: 5.0
      topology: fattree

strategy:
  tp: 8
  cp: 1
  pp: 2
  ep: 1
  dp: 4
  micro_batch: 1
  global_batch: 32
  pp_schedule: 1f1b
  zero_stage: 1
  recompute:
    per_layer:
      dense: ["attn"]
  offload: {opt_state: false, grads: false, params: false}
  tp_overlap: none
  optimizer: adam
